<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure Diary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6">
        <h1 class="text-white text-3xl font-bold mb-8">Personal Diary</h1>
        <input type="password" id="pass-input" placeholder="Enter Password" class="w-full max-w-xs p-4 rounded-xl border-none mb-4 text-center">
        <button onclick="checkPassword()" class="bg-indigo-500 text-white px-8 py-3 rounded-xl font-semibold shadow-lg">Unlock</button>
        <p id="auth-error" class="text-red-400 mt-4 hidden">Access Denied</p>
    </div>

    <div id="main-content" class="max-w-md mx-auto p-4 pb-24 hidden">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Let's Talk</h2>
            <button onclick="toggleView('editor')" class="bg-indigo-600 text-white p-3 rounded-full shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </header>

        <div id="entries-list" class="space-y-4"></div>

        <div class="mt-12 mb-8 text-center">
            <button onclick="clearAll()" class="text-slate-800 text-xs font-bold uppercase tracking-widest hover:text-red-400 transition-colors">
                Clear All Memories
            </button>
        </div>

        <div id="editor-view" class="fixed inset-0 bg-slate-50 z-40 p-6 flex flex-col hidden overflow-y-auto">
            <div class="flex justify-between mb-4">
                <button onclick="toggleView('list')" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">Cancel</button>
                <button onclick="saveEntry()" class="bg-green-500 text-white px-6 py-2 rounded-lg font-bold">Save</button>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">I am here for You My Love Tell Me..</h2>
            <br>
            <textarea id="entry-body" placeholder="Write your thoughts..." class="flex-grow w-full resize-none border-none focus:ring-0 outline-none text-slate-700 text-lg"></textarea>

            <div class="mt-4 border-t pt-4 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(event)">
                    <button onclick="document.getElementById('image-input').click()" class="bg-slate-100 p-3 rounded-2xl text-slate-600 hover:bg-slate-200 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>

                <div class="flex items-center bg-slate-200 p-1.5 rounded-2xl">
                    <button onclick="setEntryType('text')" id="type-text" class="px-4 py-2 rounded-xl bg-white shadow-sm font-bold text-[10px] uppercase tracking-wider transition-all">Text</button>
                    <button onclick="setEntryType('list')" id="type-list" class="px-4 py-2 rounded-xl text-slate-400 font-bold text-[10px] uppercase tracking-wider transition-all">List</button>
                </div>
            </div>

            <div id="img-preview" class="mt-4 relative hidden">
                <img id="preview-src" src="" class="rounded-3xl h-40 w-full object-cover shadow-inner">
                <button onclick="clearImage()" class="absolute top-2 right-2 bg-red-500/80 backdrop-blur-md text-white rounded-full p-2 shadow-lg">✕</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
